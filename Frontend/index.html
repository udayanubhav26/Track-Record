<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker </title>
  <link rel="stylesheet" href="style.css">
 <link rel="icon" href="favicon.ico" type="image/x-icon">
  

<div id="splash">

    <img src="favicon.ico" class="logo" />
    <div class="spinner"></div>

  </div>
</div>
<body data-page="setup">
  <nav>
  <a href="index.html">Setup</a>
  <a href="dashboard.html">Dashboard</a>

 <label>Select Month</label>
<select id="setupMonth"></select>

<input id="salary" placeholder="Salary">

<button onclick="saveSetup()">Save Setup</button> 


<div class="container">

  <h1 class="page-title">Track Record</h1>

  <div class="card">

<script>
  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";

  });
</script>

<script src="app.js"></script>
