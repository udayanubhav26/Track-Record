<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="transactions">

<nav>
  <a href="index.html">Setup</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="transactions.html">Transactions</a>
  <a href="report.html">Monthly Report</a>
</nav>

<div class="container">

  <h1 class="page-title">Transactions</h1>
  <p class="subtitle">Add income and expenses with date and category.</p>

  <div class="card">
    <h2>Add Transaction</h2>

    <input id="title" type="text" placeholder="Title">
    <input id="amount" type="number" placeholder="Amount">

    <select id="type">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
    </select>

    <select id="category"></select>

    <input id="customCategory" class="hidden" type="text" placeholder="New category">
    <input id="date" type="date">

    <button onclick="addTransaction()">Add Transaction</button>
  </div>

  <div class="card">
    <h2>All Transactions</h2>
    <div id="list" class="list"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
