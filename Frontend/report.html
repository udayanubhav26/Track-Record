<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monthly Report</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body data-page="report">

<nav>
  <a href="index.html">Setup</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="transactions.html">Transactions</a>
  <a href="report.html">Monthly Report</a>
</nav>

<div class="container">

  <h1 class="page-title">Monthly Report</h1>
  <p class="subtitle" id="reportLabel"></p>

  <div class="card report-controls">
    <div class="control">
      <label>Select Month</label>
      <select id="reportMonth"></select>
    </div>
  </div>

  <div class="kpi">
    <div class="kpi-box">
      <div class="kpi-label">Total Income</div>
      <div class="kpi-value" id="r_income">₹0</div>
    </div>

    <div class="kpi-box">
      <div class="kpi-label">Total Expense</div>
      <div class="kpi-value" id="r_expense">₹0</div>
    </div>

    <div class="kpi-box">
      <div class="kpi-label">Balance</div>
      <div class="kpi-value" id="r_balance">₹0</div>
    </div>

    <div class="kpi-box">
      <div class="kpi-label">Savings</div>
      <div class="kpi-value" id="r_savings">₹0</div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="card">
      <h2>Income / Expense / Balance</h2>
      <div class="chart-wrap">
        <canvas id="reportBarChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Category-Wise Expense</h2>
      <div class="chart-wrap">
        <canvas id="reportCategoryChart"></canvas>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Transactions in Selected Month</h2>
    <div id="reportList" class="list"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
