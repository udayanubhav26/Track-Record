<!DOCTYPE html>
<html>
<head>
  <title>Monthly Report</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1f1f2e, #2d2d44);
      color: white;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>📅 Monthly Report</h1>

<div class="card">
  <h3>Monthly Expense Overview</h3>
  <canvas id="monthlyChart"></canvas>
</div>

<script>
async function load() {
  let res = await fetch("/api/data");
  let data = await res.json();

  let total = 0;
  data.transactions.forEach(t => total += t.amount);

  new Chart(document.getElementById("monthlyChart"), {
    type: "bar",
    data: {
      labels: ["Total Expense"],
      datasets: [{
        label: "₹",
        data: [total]
      }]
    }
  });
}

load();
</script>

</body>
</html>
